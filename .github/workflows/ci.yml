name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax:
    name: syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check every Python module
        # Uses py_compile so we don't need to install py_clob_client /
        # web3 / fastapi to validate syntax. Catches indentation errors,
        # bad imports referenced at module scope, and similar issues that
        # would otherwise blow up at systemctl-restart time on the VPS.
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          for f in *.py; do
            echo "compile: $f"
            python -m py_compile "$f" || failed=1
          done
          exit $failed

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate index.html inline JS
        # The dashboard is a single-file HTML with inline <script> blocks.
        # Extract each block and parse it with node's Function constructor;
        # catches unclosed brackets, stray tokens, typos that would silently
        # leave a blank dashboard in a browser.
        run: |
          node -e "
          const fs=require('fs');
          const html=fs.readFileSync('index.html','utf8');
          const m=html.match(/<script>([\\s\\S]*?)<\\/script>/g) || [];
          let fail=0;
          for (const s of m) {
            const body = s.replace(/^<script>/,'').replace(/<\\/script>$/,'');
            try { new Function(body); }
            catch(e) { console.log('JS ERROR:', e.message); fail=1; }
          }
          process.exit(fail);
          "

  deploy:
    name: deploy to VPS
    runs-on: ubuntu-latest
    # Only deploy on push to main (never on PRs). Waits for `syntax` to
    # succeed — a broken build never hits production.
    needs: syntax
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Decode base64-encoded SSH key
        # The key is stored as a single-line base64 blob to dodge all
        # whitespace/line-ending mishaps that come from pasting multi-line
        # PEM into the Secrets UI. We decode it to a file, set 0600
        # permissions, and hand the plain path to the ssh action. No key
        # material ever lands in the workflow output.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          # Sanity-check: must end with an OpenSSH private key footer
          if ! tail -1 ~/.ssh/vps_key | grep -q "PRIVATE KEY-----"; then
            echo "ERROR: decoded key does not end with a PRIVATE KEY footer"
            echo "Check that VPS_SSH_KEY_B64 is a valid base64 encoding of the private key"
            exit 1
          fi

      - name: SSH into VPS, pull main, restart sexybot
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 159.65.201.165
          username: root
          key_path: /home/runner/.ssh/vps_key
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/polybot
            echo "── Before deploy ──"
            git rev-parse --short HEAD
            git fetch origin main
            # reset --hard so local drift (accidental edits on the VPS)
            # can't block the pull. The workflow trusts main.
            git reset --hard origin/main
            echo "── After pull ──"
            git rev-parse --short HEAD
            echo "── Restarting sexybot ──"
            systemctl restart sexybot
            # Sync dashboard HTML to nginx web root and reload
            if [ -f index.html ]; then
              cp index.html /var/www/html/index.html
              nginx -t && systemctl reload nginx || true
            fi
            # Wait briefly and verify the service is healthy
            sleep 3
            if ! systemctl is-active --quiet sexybot; then
              echo "❌ sexybot failed to start after deploy"
              journalctl -u sexybot -n 60 --no-pager
              exit 1
            fi
            echo "✅ sexybot active. Recent log:"
            journalctl -u sexybot -n 20 --no-pager
