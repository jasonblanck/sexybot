# Per-IP brute-force throttle for the dashboard login. Keep separate from any
# generic API rate limit so a busy dashboard tab doesn't push the operator's
# next login over the same bucket.
limit_req_zone $binary_remote_addr zone=auth_login:1m rate=10r/m;

# Redirect all HTTP to HTTPS
server {
    listen 80;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;

    ssl_certificate     /etc/ssl/certs/sexybot.crt;
    ssl_certificate_key /etc/ssl/private/sexybot.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    # CSP: index.html relies on heavy inline scripts/styles, so 'unsafe-inline'
    # stays — but the policy still blocks the high-impact things: loading JS
    # from arbitrary origins (only Chart.js's cdnjs allowlisted) and
    # exfiltrating data via fetch/XHR/WebSocket to non-self destinations.
    # connect-src is intentionally restrictive — the dashboard only talks to
    # its own origin (REST + /ws). frame-ancestors duplicates X-Frame-Options
    # for the modern browsers that prefer the CSP form.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    root  /var/www/html;
    index index.html;

    # Backtest blocks on Claude for up to ~3 min; needs a longer read timeout
    # than the default 30s used by the other API routes below. ^~ makes nginx
    # prefer this prefix over the regex location that follows.
    location ^~ /backtest {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Dashboard login — rate-limited so the password can't be brute-forced.
    # 10 req/min per IP with a small burst for a fat-fingered retry.
    # `^~` makes nginx prefer this exact-prefix location over the regex
    # location below (which would otherwise match /auth/login too).
    location ^~ /auth/login {
        limit_req zone=auth_login burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # Bot API routes — proxy to FastAPI on port 8000
    # NOTE: /auth/* is required for dashboard session login — without
    # it nginx would 404 the login POST and gate the user out.
    location ~ ^/(status|portfolio|markets|orderbook|weather|fmp|start|stop|trade|paper|settings|cancel|regime|reviews|pretrade|pnl|brier|deep|backtest|health|auth|spend|admin|metrics|activity)(/.*)?$ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # /api/ prefix routes (macro, market-data)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass         http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # Static files (index.html, etc.)
    location / {
        try_files $uri $uri/ =404;
    }
}
